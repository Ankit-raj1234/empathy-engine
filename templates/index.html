<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Empathy Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
    }
    .header h1 span { color: #a78bfa; }
    .header p {
      color: #a0a0c0;
      margin-top: 8px;
      font-size: 1rem;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 36px;
      backdrop-filter: blur(12px);
    }

    label {
      display: block;
      color: #c4b5fd;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 130px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      padding: 14px 16px;
      resize: vertical;
      outline: none;
      transition: border 0.2s;
    }
    textarea:focus { border-color: #a78bfa; }
    textarea::placeholder { color: #666; }

    .char-count {
      text-align: right;
      color: #666;
      font-size: 0.78rem;
      margin-top: 6px;
    }

    button#generateBtn {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    button#generateBtn:hover { opacity: 0.9; }
    button#generateBtn:active { transform: scale(0.98); }
    button#generateBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    #result {
      display: none;
      margin-top: 28px;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .emotion-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }
    .badge-positive { background: rgba(52,211,153,0.2); color: #34d399; border: 1px solid #34d399; }
    .badge-negative { background: rgba(248,113,113,0.2); color: #f87171; border: 1px solid #f87171; }
    .badge-neutral  { background: rgba(148,163,184,0.2); color: #94a3b8; border: 1px solid #94a3b8; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }
    .stat-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .stat-box .val {
      font-size: 1.5rem;
      font-weight: 800;
      color: #a78bfa;
    }
    .stat-box .lbl {
      font-size: 0.72rem;
      color: #888;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    audio {
      width: 100%;
      margin-top: 4px;
      border-radius: 10px;
      outline: none;
      filter: invert(1) hue-rotate(180deg);
    }

    .audio-label {
      color: #a0a0c0;
      font-size: 0.82rem;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .error-msg {
      background: rgba(248,113,113,0.15);
      border: 1px solid #f87171;
      color: #f87171;
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 0.9rem;
      display: none;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 22px 0;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>The <span>Empathy</span> Engine</h1>
    <p>Emotionally expressive AI voice synthesizer</p>
  </div>

  <div class="card">
    <label for="textInput">Enter your text</label>
    <textarea id="textInput" placeholder="Type something... e.g. 'I just got promoted! This is the best day ever!'"></textarea>
    <div class="char-count"><span id="charCount">0</span> / 500</div>

    <button id="generateBtn" onclick="generate()">
      <span id="btnText">Generate Voice</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <div id="result">
      <hr class="divider"/>
      <div id="emotionBadge" class="emotion-badge"></div>

      <div class="stats">
        <div class="stat-box">
          <div class="val" id="statCompound">-</div>
          <div class="lbl">Sentiment Score</div>
        </div>
        <div class="stat-box">
          <div class="val" id="statRate">-</div>
          <div class="lbl">Rate (wpm)</div>
        </div>
        <div class="stat-box">
          <div class="val" id="statVolume">-</div>
          <div class="lbl">Volume</div>
        </div>
      </div>

      <div class="audio-label">Generated Audio</div>
      <audio id="audioPlayer" controls></audio>
    </div>
  </div>
</div>

<script>
  const textarea = document.getElementById('textInput');
  textarea.addEventListener('input', () => {
    document.getElementById('charCount').textContent = textarea.value.length;
  });

  async function generate() {
    const text = textarea.value.trim();
    if (!text) return;

    const btn = document.getElementById('generateBtn');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');
    const errorMsg = document.getElementById('errorMsg');
    const result = document.getElementById('result');

    // Loading state
    btn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'block';
    errorMsg.style.display = 'none';
    result.style.display = 'none';

    try {
      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });

      const data = await res.json();

      if (!res.ok) {
        errorMsg.textContent = data.error || 'Something went wrong.';
        errorMsg.style.display = 'block';
        return;
      }

      // Emotion badge
      const badge = document.getElementById('emotionBadge');
      badge.textContent = data.emotion;
      badge.className = 'emotion-badge badge-' + data.category;

      // Stats
      document.getElementById('statCompound').textContent = data.compound;
      document.getElementById('statRate').textContent = data.rate;
      document.getElementById('statVolume').textContent = data.volume;

      // Audio
      const audio = document.getElementById('audioPlayer');
      audio.src = data.audio_url + '?t=' + Date.now();
      audio.load();
      audio.play();

      result.style.display = 'block';

    } catch (err) {
      errorMsg.textContent = 'Network error. Make sure the server is running.';
      errorMsg.style.display = 'block';
    } finally {
      btn.disabled = false;
      btnText.style.display = 'inline';
      spinner.style.display = 'none';
    }
  }

  // Allow Enter key (Ctrl+Enter) to submit
  textarea.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') generate();
  });
</script>

</body>
</html>
